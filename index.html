<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" id="theme-color-meta" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sit—Still" />
  <meta name="mobile-web-app-capable" content="yes" />

  <meta name="description" content="Will DiBernardo — RLA, ASLA — Sit-Still Landscape Architecture, Los Angeles" />
  <title>Sit—Still</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <!-- Inter: Regular (400) + Medium (500) only -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">

  <!-- Install prompt (browser only, not shown in standalone PWA) -->
  <div class="install-prompt" id="installPrompt" aria-live="polite">
    <span>Add to Home Screen for the full experience</span>
    <button class="install-prompt__dismiss" id="dismissPrompt" aria-label="Dismiss">&#x2715;</button>
  </div>

  <!-- Card background -->
  <main class="card" id="card" role="main" aria-label="Sit-Still business card">

    <!-- Zone 1: Wordmark — top: 10vh, font 109px/0.93, Inter Medium -->
    <div class="wordmark" aria-label="Sit-Still">
      <span class="wordmark__line">sit&#x2014;</span>
      <span class="wordmark__line">still</span>
    </div>

    <!-- Zone 2: QR code square — top: 42vh, 63% content width -->
    <div class="qr-zone" id="qrcode" aria-label="QR code — scan to save contact"></div>

    <!-- Zone 3: Name block — top: 77vh, 25px/1.25 -->
    <!--
      Line 1: "Will DiBernardo" (Medium 500) + ", RLA, ASLA" (Regular 400) inline
      Line 2: "Founding Principal" (Regular 400)
    -->
    <div class="name-block">
      <span class="name-block__line">
        <span class="name-medium">Will DiBernardo</span><span class="name-regular">, RLA, ASLA</span>
      </span>
      <span class="name-block__line name-regular">Founding Principal</span>
    </div>

    <!-- Zone 4: Contact body — top: 79vh, 25px/1.3, Regular 400 -->
    <div class="body-block">
      <span class="body-line">will@sit-still.com</span>
      <a href="tel:+12014520547" class="body-line">201.452.0547</a>
    </div>

    <!-- Bottom bar — dark toggle | share | sit-still.com -->
    <div class="bottom-bar">

      <!-- Theme toggle -->
      <button class="theme-toggle" id="btnTheme" aria-label="Switch to dark mode">
        <!-- Moon: shown in light mode to offer dark -->
        <svg class="icon-moon" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M14.5 10.5A6 6 0 0 1 7.5 3.5a6 6 0 1 0 7 7z"
                stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <!-- Sun: shown in dark mode to offer light -->
        <svg class="icon-sun" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="9"    y1="1"    x2="9"    y2="3"    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="9"    y1="15"   x2="9"    y2="17"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1"    y1="9"    x2="3"    y2="9"    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="15"   y1="9"    x2="17"   y2="9"    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="3.22" y1="3.22" x2="4.64" y2="4.64" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="13.36" y1="13.36" x2="14.78" y2="14.78" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14.78" y1="3.22"  x2="13.36" y2="4.64"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="4.64"  y1="13.36" x2="3.22"  y2="14.78" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="themeLabel">dark</span>
      </button>

      <!-- Share button -->
      <button class="share-btn" id="btnShare" aria-label="Share contact card">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 1v9M5 4l3-3 3 3"
                stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 7H2a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>share</span>
      </button>

      <!-- Website link -->
      <a href="https://sit-still.com" class="website-link" target="_blank" rel="noopener">sit-still.com</a>

    </div>

  </main>

  <script src="qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
