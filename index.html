<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f3ef" id="theme-color-meta" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sit—Still" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- SEO / Social -->
  <meta name="description" content="Will DiBernardo — RLA, ASLA — Sit-Still Landscape Architecture, Los Angeles" />

  <title>Sit—Still</title>

  <link rel="manifest" href="manifest.json" />

  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">

  <!-- Install prompt banner (shown only in browser, not in standalone mode) -->
  <div class="install-prompt" id="installPrompt" aria-live="polite">
    <span class="install-prompt__text">Add to Home Screen for the full experience</span>
    <button class="install-prompt__dismiss" id="dismissPrompt" aria-label="Dismiss">&#x2715;</button>
  </div>

  <!-- Main card view: contact/info side (default) -->
  <main class="card" id="cardFront" role="main">

    <!-- Top control strip -->
    <div class="card__controls">
      <button class="btn-icon btn-flip" id="btnFlip" aria-label="Show wordmark side" title="Flip card">
        <!-- Flip icon: two overlapping rectangles -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="1" y="4" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="6" y="6" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </button>
      <button class="btn-icon btn-theme" id="btnTheme" aria-label="Toggle dark mode">
        <!-- Sun/moon — toggled via JS -->
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.4"/>
          <line x1="9" y1="1" x2="9" y2="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="9" y1="15" x2="9" y2="17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="1" y1="9" x2="3" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="15" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="3.22" y1="3.22" x2="4.64" y2="4.64" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="13.36" y1="13.36" x2="14.78" y2="14.78" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="14.78" y1="3.22" x2="13.36" y2="4.64" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="4.64" y1="13.36" x2="3.22" y2="14.78" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M14.5 10.5A6 6 0 0 1 7.5 3.5a6 6 0 1 0 7 7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Contact content -->
    <div class="card__body">

      <header class="card__header">
        <h1 class="name">Will DiBernardo</h1>
        <p class="credentials">RLA, ASLA, #6962</p>
      </header>

      <section class="card__contact" aria-label="Contact information">
        <a href="mailto:will@sit-still.com" class="contact-line contact-line--email">will@sit-still.com</a>
        <a href="tel:+12014520547" class="contact-line contact-line--phone">201.452.0547</a>
      </section>

      <!-- QR Code -->
      <section class="card__qr" aria-label="QR code — scan to save contact">
        <div id="qrcode" class="qr-container"></div>
        <p class="qr-label">scan to save contact</p>
      </section>

      <!-- Share button -->
      <div class="card__share">
        <button class="btn-share" id="btnShare" aria-label="Share contact card">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <!-- iOS-style share icon: box with arrow pointing up -->
            <path d="M8 1v9M5 4l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 7H2a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span>share</span>
        </button>
      </div>

      <!-- Wordmark footer -->
      <footer class="card__footer">
        <div class="wordmark-block">
          <span class="wordmark">sit&#x2014;still</span>
          <span class="wordmark-sub">landscape architecture</span>
          <span class="wordmark-sub">los angeles</span>
        </div>
      </footer>

    </div>
  </main>

  <!-- Wordmark / idle side -->
  <aside class="card card--wordmark" id="cardBack" aria-hidden="true">
    <div class="card__controls">
      <button class="btn-icon btn-flip btn-flip--back" id="btnFlipBack" aria-label="Show contact side">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="1" y="4" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="6" y="6" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </button>
      <button class="btn-icon btn-theme btn-theme--back" id="btnThemeBack" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.4"/>
          <line x1="9" y1="1" x2="9" y2="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="9" y1="15" x2="9" y2="17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="1" y1="9" x2="3" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="15" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="3.22" y1="3.22" x2="4.64" y2="4.64" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="13.36" y1="13.36" x2="14.78" y2="14.78" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="14.78" y1="3.22" x2="13.36" y2="4.64" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="4.64" y1="13.36" x2="3.22" y2="14.78" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M14.5 10.5A6 6 0 0 1 7.5 3.5a6 6 0 1 0 7 7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="wordmark-idle">
      <div class="wordmark-idle__lines">
        <span class="wordmark-idle__line">sit</span>
        <span class="wordmark-idle__line">still</span>
        <span class="wordmark-idle__sub">landscape architecture</span>
      </div>
      <div class="wordmark-idle__url">sit-still.com</div>
    </div>
  </aside>

  <!-- QR code library (loaded from CDN with integrity) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
          integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSOfQ786569ol2dd+HHL7JHkVMa0kq99btdQ=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
  <script src="app.js" defer></script>
</body>
</html>
